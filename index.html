<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="生活の困りごとに、無印良品の商品をご提案します。">
  <title>くらしの相談 — 無印コンシェルジュ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #FFFFFF;
      color: #1F1D18;
      -webkit-font-smoothing: antialiased;
    }
    input, textarea, button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const API_KEY_STORAGE = 'muji_anthropic_api_key';

    const svgProps = {
      viewBox: "0 0 80 80",
      fill: "none",
      stroke: "#1F1D18",
      strokeWidth: "1.4",
      strokeLinejoin: "round",
      strokeLinecap: "round",
      width: "100%",
      height: "100%",
    };

    function StorageIcon() {
      return (
        <svg {...svgProps}>
          <rect x="18" y="22" width="44" height="42" />
          <line x1="18" y1="36" x2="62" y2="36" />
          <line x1="18" y1="50" x2="62" y2="50" />
          <line x1="38" y1="28" x2="42" y2="28" />
          <line x1="38" y1="42" x2="42" y2="42" />
          <line x1="38" y1="56" x2="42" y2="56" />
        </svg>
      );
    }

    function ClothingIcon() {
      return (
        <svg {...svgProps}>
          <path d="M 30 18 L 33 14 L 47 14 L 50 18 L 62 24 L 56 36 L 50 32 L 50 64 L 30 64 L 30 32 L 24 36 L 18 24 Z" />
        </svg>
      );
    }

    function FoodIcon() {
      return (
        <svg {...svgProps}>
          <path d="M 14 42 Q 14 60 40 60 Q 66 60 66 42 Z" />
          <line x1="12" y1="42" x2="68" y2="42" />
          <path d="M 35 28 Q 37 26 35 22" />
          <path d="M 45 28 Q 47 26 45 22" />
        </svg>
      );
    }

    function StationeryIcon() {
      return (
        <svg {...svgProps}>
          <rect x="24" y="18" width="32" height="46" />
          <line x1="30" y1="28" x2="50" y2="28" />
          <line x1="30" y1="36" x2="50" y2="36" />
          <line x1="30" y1="44" x2="50" y2="44" />
          <line x1="30" y1="52" x2="44" y2="52" />
        </svg>
      );
    }

    function InteriorIcon() {
      return (
        <svg {...svgProps}>
          <line x1="26" y1="18" x2="26" y2="54" />
          <line x1="54" y1="18" x2="54" y2="54" />
          <line x1="26" y1="18" x2="54" y2="18" />
          <line x1="22" y1="46" x2="58" y2="46" />
          <line x1="22" y1="46" x2="22" y2="54" />
          <line x1="58" y1="46" x2="58" y2="54" />
          <line x1="28" y1="54" x2="28" y2="66" />
          <line x1="52" y1="54" x2="52" y2="66" />
        </svg>
      );
    }

    function BeddingIcon() {
      return (
        <svg {...svgProps}>
          <line x1="14" y1="56" x2="66" y2="56" />
          <line x1="14" y1="56" x2="14" y2="66" />
          <line x1="66" y1="56" x2="66" y2="66" />
          <rect x="22" y="42" width="38" height="14" />
          <rect x="20" y="36" width="14" height="8" />
        </svg>
      );
    }

    function AromaIcon() {
      return (
        <svg {...svgProps}>
          <ellipse cx="40" cy="54" rx="16" ry="14" />
          <line x1="40" y1="40" x2="40" y2="32" />
          <path d="M 36 28 Q 40 24 44 28" />
          <path d="M 32 22 Q 40 14 48 22" />
        </svg>
      );
    }

    function OutdoorIcon() {
      return (
        <svg {...svgProps}>
          <path d="M 16 62 L 40 22 L 64 62 Z" />
          <line x1="40" y1="22" x2="40" y2="62" />
          <line x1="36" y1="62" x2="40" y2="50" />
          <line x1="44" y1="62" x2="40" y2="50" />
        </svg>
      );
    }

    function BeautyIcon() {
      return (
        <svg {...svgProps}>
          <rect x="32" y="30" width="16" height="34" />
          <path d="M 34 30 L 34 22 L 46 22 L 46 30" />
          <line x1="36" y1="18" x2="44" y2="18" />
          <line x1="32" y1="42" x2="48" y2="42" />
        </svg>
      );
    }

    function KitchenIcon() {
      return (
        <svg {...svgProps}>
          <path d="M 22 30 L 22 60 L 58 60 L 58 30 Z" />
          <path d="M 22 30 L 26 22 L 54 22 L 58 30" />
          <line x1="34" y1="40" x2="34" y2="52" />
          <line x1="46" y1="40" x2="46" y2="52" />
        </svg>
      );
    }

    function DefaultIcon() {
      return (
        <svg {...svgProps}>
          <rect x="24" y="24" width="32" height="32" />
          <line x1="40" y1="32" x2="40" y2="48" />
          <line x1="32" y1="40" x2="48" y2="40" />
        </svg>
      );
    }

    function CategoryIllustration({ category }) {
      const cat = (category || '');
      if (cat.includes('収納') || cat.includes('整理') || cat.includes('整頓')) return <StorageIcon />;
      if (cat.includes('衣') || cat.includes('服') || cat.includes('ウェア') || cat.includes('アパレル')) return <ClothingIcon />;
      if (cat.includes('食品') || cat.includes('飲料') || cat.includes('レトルト') || cat.includes('お菓子')) return <FoodIcon />;
      if (cat.includes('文具') || cat.includes('紙') || cat.includes('ノート') || cat.includes('ペン')) return <StationeryIcon />;
      if (cat.includes('インテリア') || cat.includes('家具') || cat.includes('ソファ') || cat.includes('椅子')) return <InteriorIcon />;
      if (cat.includes('寝具') || cat.includes('布団') || cat.includes('枕') || cat.includes('シーツ')) return <BeddingIcon />;
      if (cat.includes('アロマ') || cat.includes('香り') || cat.includes('ディフューザー')) return <AromaIcon />;
      if (cat.includes('アウトドア') || cat.includes('キャンプ') || cat.includes('自然')) return <OutdoorIcon />;
      if (cat.includes('美容') || cat.includes('化粧') || cat.includes('スキンケア') || cat.includes('ヘア')) return <BeautyIcon />;
      if (cat.includes('キッチン') || cat.includes('調理') || cat.includes('クッキング')) return <KitchenIcon />;
      return <DefaultIcon />;
    }

    function App() {
      const [apiKey, setApiKey] = useState(() => localStorage.getItem(API_KEY_STORAGE) || '');
      const [hasKey, setHasKey] = useState(() => !!localStorage.getItem(API_KEY_STORAGE));
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState('');
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [showSettings, setShowSettings] = useState(false);

      const examples = [
        '来週引っ越しをします',
        '在宅勤務でデスクの上が散らかる',
        '週末にキャンプに行く',
        '梅雨で洗濯物が乾かない',
      ];

      useEffect(() => {
        if (!loading) return;
        const messages = [
          'ご状況を理解しています',
          '無印良品ネットストアを検索しています',
          'おたよりブログを参考にしています',
          '提案をまとめています',
        ];
        let i = 0;
        setLoadingMsg(messages[0]);
        const interval = setInterval(() => {
          i = (i + 1) % messages.length;
          setLoadingMsg(messages[i]);
        }, 4000);
        return () => clearInterval(interval);
      }, [loading]);

      const saveKey = (e) => {
        e?.preventDefault();
        if (!apiKey.trim()) return;
        localStorage.setItem(API_KEY_STORAGE, apiKey.trim());
        setHasKey(true);
        setShowSettings(false);
      };

      const clearKey = () => {
        localStorage.removeItem(API_KEY_STORAGE);
        setApiKey('');
        setHasKey(false);
        setResult(null);
        setInput('');
      };

      const handleSubmit = async (text) => {
        const query = (text ?? input).trim();
        if (!query) return;
        setInput(query);
        setLoading(true);
        setError(null);
        setResult(null);

        const systemPrompt = `あなたは無印良品の商品に精通したコンシェルジュです。

【手順】
1. ユーザーの状況を理解する
2. web_searchツールで site:muji.com を含む検索を行い、実在する適切な無印良品の商品を6点見つける
3. web_searchツールで「site:muji.com/jp/ja/store/articles」を含む検索を行い、それぞれの商品の使い方や生活シーンを「おたより」スタッフブログから調べる
4. 検索結果に基づいて、以下のJSON形式のみで回答する

【検索のコツ】
- 商品検索例: site:muji.com 引っ越し 収納
- ブログ検索例: site:muji.com/jp/ja/store/articles 引っ越し 整理

【JSON形式 - 前後の説明やコードフェンスは絶対に含めない】
{
  "summary": "ユーザーの状況を1文で言い換えた共感の言葉",
  "products": [
    {
      "name": "実在する正確な商品名",
      "category": "カテゴリ（収納、衣料、食品、文具、インテリア、寝具、アロマ、キッチン、美容、アウトドアなどから選ぶ）",
      "productUrl": "無印良品ネットストア(muji.com)上の正確な商品ページURL",
      "why": "なぜこの商品が役立つかを1〜2文で",
      "howToUse": "おたよりブログを参考にした具体的な使い方や生活シーンを2〜3文で",
      "articleUrl": "参考にしたおたよりブログ記事のURL（muji.com/jp/ja/store/articles/...で始まる）",
      "articleTitle": "参考にしたおたよりブログ記事のタイトル（20文字以内に短縮）"
    }
  ]
}

必ず6点提案すること。商品はそれぞれ異なるカテゴリ・タイプから選び、多様性を持たせること。
productUrlとarticleUrlは実際に検索で見つけた無印公式サイトの正確なURLを記載すること。
該当するおたよりブログ記事が見つからない場合は、articleUrlとarticleTitleは空文字列""にすること。`;

        try {
          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-5',
              max_tokens: 8000,
              system: systemPrompt,
              tools: [
                {
                  type: 'web_search_20250305',
                  name: 'web_search',
                  max_uses: 12,
                },
              ],
              messages: [{ role: 'user', content: query }],
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            if (response.status === 401) {
              setError('APIキーが無効です。設定から再入力してください。');
            } else {
              setError(data.error?.message || 'APIエラーが発生しました');
            }
            return;
          }

          let text = (data.content || [])
            .filter((b) => b.type === 'text')
            .map((b) => b.text)
            .join('\n');

          const firstBrace = text.indexOf('{');
          const lastBrace = text.lastIndexOf('}');
          if (firstBrace !== -1 && lastBrace !== -1) {
            text = text.substring(firstBrace, lastBrace + 1);
          }

          const parsed = JSON.parse(text);
          setResult(parsed);
        } catch (e) {
          console.error(e);
          setError('エラー: ' + (e.message || JSON.stringify(e)));
        } finally {
          setLoading(false);
        }
      };

      if (!hasKey || showSettings) {
        return (
          <div style={{minHeight:'100vh',background:'#F4F1EA',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
            <form onSubmit={saveKey} style={{background:'#FFFFFF',border:'1px solid #E5DFD0',padding:32,maxWidth:400,width:'100%'}}>
              <div style={{fontSize:11,letterSpacing:'0.2em',color:'#C7321F',marginBottom:14,fontWeight:500}}>MUJI CONCIERGE</div>
              <h1 style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:20,fontWeight:500,margin:'0 0 16px',lineHeight:1.5}}>APIキーを設定してください</h1>
              <p style={{fontSize:12,lineHeight:1.8,color:'#6B6760',marginBottom:20}}>
                Anthropic Console で取得したAPIキーを入力します。<br />
                このキーはあなたのブラウザ内にのみ保存され、外部に送信されません。
              </p>
              <input type="password" value={apiKey} onChange={(e)=>setApiKey(e.target.value)} placeholder="sk-ant-..." autoFocus
                style={{width:'100%',padding:'12px',border:'1px solid #C9C2B2',fontSize:14,marginBottom:12,outline:'none',background:'#FBF9F4'}} />
              <button type="submit" disabled={!apiKey.trim()}
                style={{width:'100%',padding:'12px',background:apiKey.trim()?'#1F1D18':'#D9D2C2',color:'#FFFFFF',border:'none',fontSize:14,letterSpacing:'0.15em',cursor:apiKey.trim()?'pointer':'default',marginBottom:12}}>
                保存して開始
              </button>
              {hasKey && (
                <button type="button" onClick={()=>setShowSettings(false)}
                  style={{width:'100%',padding:'10px',background:'transparent',border:'1px solid #C9C2B2',fontSize:12,cursor:'pointer',color:'#3A3833'}}>
                  キャンセル
                </button>
              )}
              <p style={{fontSize:10,color:'#8B8780',marginTop:16,lineHeight:1.7}}>
                APIキーの取得：<br />
                console.anthropic.com → API Keys → Create Key
              </p>
            </form>
          </div>
        );
      }

      return (
        <div style={{minHeight:'100vh',background:'#FFFFFF'}}>
          <div style={{borderBottom:'1px solid #EAE6DC',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:11,letterSpacing:'0.2em',color:'#C7321F',fontWeight:600}}>MUJI CONCIERGE</div>
            <div style={{fontSize:10,color:'#8B8780',letterSpacing:'0.1em'}}>PROTOTYPE</div>
          </div>

          <div style={{maxWidth:760,margin:'0 auto',padding:'48px 24px 80px'}}>
            <header style={{marginBottom:48,textAlign:'center'}}>
              <h1 style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:30,fontWeight:500,lineHeight:1.5,margin:'0 0 16px',letterSpacing:'0.05em'}}>
                くらしの相談、<br />無印良品から。
              </h1>
              <div style={{width:32,height:1,background:'#C7321F',margin:'20px auto'}} />
              <p style={{fontSize:13,color:'#6B6760',lineHeight:1.9,margin:0}}>
                日々のお困りごとや、これからすることを書いてください。<br />
                無印良品ネットストアの商品と、おたよりからの<br />
                おすすめの使い方をご提案します。
              </p>
            </header>

            <div style={{background:'#FAF8F3',border:'1px solid #EAE6DC',padding:24,marginBottom:24,maxWidth:680,margin:'0 auto 24px'}}>
              <textarea value={input} onChange={(e)=>setInput(e.target.value)} placeholder="例：来週から在宅勤務がはじまります" rows={3}
                style={{width:'100%',border:'none',outline:'none',resize:'none',fontSize:15,lineHeight:1.8,color:'#1F1D18',background:'transparent'}} />
              <button onClick={()=>handleSubmit()} disabled={loading||!input.trim()}
                style={{width:'100%',marginTop:16,padding:'15px',background:(loading||!input.trim())?'#D9D2C2':'#1F1D18',color:'#FFFFFF',border:'none',fontSize:14,letterSpacing:'0.2em',cursor:(loading||!input.trim())?'default':'pointer',transition:'background 0.2s'}}>
                {loading ? '考えています...' : '提案を受け取る'}
              </button>
            </div>

            {!result && !loading && (
              <div style={{marginBottom:40,maxWidth:680,margin:'0 auto 40px'}}>
                <p style={{fontSize:11,color:'#8B8780',letterSpacing:'0.2em',marginBottom:12}}>ためしてみる</p>
                <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                  {examples.map((ex)=>(
                    <button key={ex} onClick={()=>handleSubmit(ex)}
                      style={{background:'#FFFFFF',border:'1px solid #D9D2C2',color:'#3A3833',padding:'10px 16px',fontSize:12,cursor:'pointer'}}>
                      {ex}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {loading && (
              <div style={{textAlign:'center',padding:'60px 20px'}}>
                <div style={{display:'inline-block',width:18,height:18,border:'2px solid #EAE6DC',borderTopColor:'#C7321F',borderRadius:'50%',animation:'spin 0.9s linear infinite',marginBottom:20}} />
                <div style={{fontSize:13,color:'#6B6760',letterSpacing:'0.05em',animation:'pulse 2s ease-in-out infinite'}}>
                  {loadingMsg}…
                </div>
                <div style={{fontSize:11,color:'#A8A39A',marginTop:12,letterSpacing:'0.05em'}}>
                  6点の商品を検索のため、20〜45秒ほどお時間をいただきます
                </div>
              </div>
            )}

            {error && (
              <div style={{padding:18,background:'#FFF5F3',border:'1px solid #E8C5BD',color:'#8B2818',fontSize:13,lineHeight:1.7,maxWidth:680,margin:'0 auto'}}>
                {error}
              </div>
            )}

            {result && (
              <div style={{animation:'fadeIn 0.6s ease-out'}}>
                <div style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:18,lineHeight:1.8,padding:'24px 0',borderTop:'1px solid #1F1D18',borderBottom:'1px solid #EAE6DC',margin:'8px auto 32px',color:'#1F1D18',maxWidth:680}}>
                  {result.summary}
                </div>

                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:20,maxWidth:680,margin:'0 auto 20px'}}>
                  <p style={{fontSize:11,color:'#8B8780',letterSpacing:'0.25em',margin:0}}>おすすめの商品</p>
                  <p style={{fontSize:10,color:'#A8A39A',margin:0,letterSpacing:'0.05em'}}>{result.products.length}点</p>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(300px, 1fr))',gap:12}}>
                  {result.products.map((p,i)=>(
                    <div key={i} style={{background:'#FFFFFF',border:'1px solid #EAE6DC',padding:'20px 20px 16px',display:'flex',flexDirection:'column'}}>
                      <div style={{textAlign:'center',padding:'4px 0 12px'}}>
                        <div style={{width:44,height:44,margin:'0 auto',opacity:0.85}}>
                          <CategoryIllustration category={p.category} />
                        </div>
                      </div>

                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                        <span style={{fontSize:10,color:'#C7321F',letterSpacing:'0.15em',fontWeight:500}}>
                          {String(i+1).padStart(2,'0')}
                        </span>
                        <span style={{fontSize:9,color:'#6B6760',background:'#F4F1EA',padding:'2px 8px',letterSpacing:'0.1em'}}>
                          {p.category}
                        </span>
                      </div>

                      <h3 style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:16,fontWeight:500,margin:'0 0 12px',lineHeight:1.5,color:'#1F1D18'}}>
                        {p.name}
                      </h3>

                      <p style={{fontSize:12,lineHeight:1.9,color:'#3A3833',margin:'0 0 14px'}}>
                        {p.why}
                      </p>

                      <div style={{background:'#FAF8F3',padding:'14px 16px',marginBottom:14,flex:1}}>
                        <div style={{fontSize:9,color:'#8B8780',letterSpacing:'0.2em',marginBottom:8,fontWeight:500}}>
                          おすすめの使い方
                        </div>
                        <p style={{fontSize:12,lineHeight:1.9,color:'#1F1D18',margin:'0 0 10px'}}>
                          {p.howToUse}
                        </p>
                        {p.articleUrl && (
                          <a href={p.articleUrl} target="_blank" rel="noopener noreferrer"
                            style={{fontSize:10,color:'#6B6760',textDecoration:'underline',letterSpacing:'0.02em',lineHeight:1.7,display:'inline-block'}}>
                            参考: {p.articleTitle || 'おたよりを読む'} →
                          </a>
                        )}
                      </div>

                      {p.productUrl && (
                        <div style={{textAlign:'right'}}>
                          <a href={p.productUrl} target="_blank" rel="noopener noreferrer"
                            style={{fontSize:11,color:'#C7321F',letterSpacing:'0.1em',fontWeight:500,borderBottom:'1px solid #C7321F',paddingBottom:2,display:'inline-block'}}>
                            商品ページを見る →
                          </a>
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                <button onClick={()=>{setResult(null);setInput('');}}
                  style={{display:'block',width:'100%',maxWidth:680,margin:'24px auto 0',padding:'14px',background:'transparent',color:'#3A3833',border:'1px solid #C9C2B2',fontSize:13,letterSpacing:'0.2em',cursor:'pointer'}}>
                  もう一度相談する
                </button>
              </div>
            )}

            <footer style={{marginTop:64,paddingTop:28,borderTop:'1px solid #EAE6DC',fontSize:10,color:'#8B8780',textAlign:'center',letterSpacing:'0.1em',lineHeight:2,maxWidth:680,margin:'64px auto 0'}}>
              本サービスはAIによる提案です。<br />
              商品の在庫・仕様は無印良品ネットストアでご確認ください。<br />
              <button onClick={()=>setShowSettings(true)}
                style={{marginTop:14,marginRight:12,background:'transparent',border:'none',color:'#8B8780',fontSize:10,letterSpacing:'0.1em',cursor:'pointer',textDecoration:'underline'}}>
                設定
              </button>
              <button onClick={clearKey}
                style={{marginTop:14,background:'transparent',border:'none',color:'#8B8780',fontSize:10,letterSpacing:'0.1em',cursor:'pointer',textDecoration:'underline'}}>
                APIキー削除
              </button>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
