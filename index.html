<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="生活の困りごとに、無印良品の商品をご提案します。">
  <title>くらしの相談 — 無印コンシェルジュ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #F4F1EA;
      color: #1F1D18;
      -webkit-font-smoothing: antialiased;
    }
    input, textarea, button { font-family: inherit; }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scaleX(0.3); }
      50% { opacity: 1; transform: scaleX(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const API_KEY_STORAGE = 'muji_anthropic_api_key';

    function App() {
      const [apiKey, setApiKey] = useState(() => localStorage.getItem(API_KEY_STORAGE) || '');
      const [hasKey, setHasKey] = useState(() => !!localStorage.getItem(API_KEY_STORAGE));
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [showSettings, setShowSettings] = useState(false);

      const examples = [
        '来週引っ越しをします',
        '在宅勤務でデスクの上が散らかる',
        '週末にキャンプに行く',
        '梅雨で洗濯物が乾かない',
      ];

      const saveKey = (e) => {
        e?.preventDefault();
        if (!apiKey.trim()) return;
        localStorage.setItem(API_KEY_STORAGE, apiKey.trim());
        setHasKey(true);
        setShowSettings(false);
      };

      const clearKey = () => {
        localStorage.removeItem(API_KEY_STORAGE);
        setApiKey('');
        setHasKey(false);
        setResult(null);
        setInput('');
      };

      const handleSubmit = async (text) => {
        const query = (text ?? input).trim();
        if (!query) return;
        setInput(query);
        setLoading(true);
        setError(null);
        setResult(null);

        const systemPrompt = `あなたは無印良品の商品に精通したコンシェルジュです。
ユーザーの生活の困りごとや、これから行うことを聞き、それを解決・サポートできる無印良品の商品を3〜4点提案してください。

回答は必ず以下のJSON形式のみで返してください。前後の説明、コードフェンス、その他のテキストは一切含めないでください。

{
  "summary": "ユーザーの状況を1文で言い換えた共感の言葉",
  "products": [
    {
      "name": "商品名（無印良品の実在の商品カテゴリ・シリーズ名）",
      "category": "カテゴリ（例：収納、衣料、食品、文具）",
      "why": "なぜこの商品が役立つかを2文以内で",
      "howToUse": "おすすめの使い方を具体的に2〜3文で"
    }
  ]
}

注意：
- 実在の無印良品の商品ライン（例：ポリプロピレン収納、頑丈収納ボックス、超音波アロマディフューザー、自分でつくる○○、体にフィットするソファ、再生紙ノート 等）から選んでください
- 特定の型番ではなく、商品ラインやカテゴリ名で記述してください
- 使い方は「なるほど」と思える具体的なシーンを描写してください`;

        try {
          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({
              model: 'claude-haiku-4-5-20251001',
              max_tokens: 1500,
              system: systemPrompt,
              messages: [{ role: 'user', content: query }],
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            if (response.status === 401) {
              setError('APIキーが無効です。設定から再入力してください。');
            } else {
              setError(data.error?.message || 'APIエラーが発生しました');
            }
            return;
          }

          const text = (data.content || [])
            .filter((b) => b.type === 'text')
            .map((b) => b.text)
            .join('\n')
            .replace(/```/g, '')
            .trim();

          const parsed = JSON.parse(text);
          setResult(parsed);
        } catch (e) {
          console.error(e);
          setError('エラー: ' + (e.message || JSON.stringify(e)));
        } finally {
          setLoading(false);
        }
      };

      if (!hasKey || showSettings) {
        return (
          <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
            <form onSubmit={saveKey} style={{background:'#FFFFFF',border:'1px solid #E5DFD0',padding:28,maxWidth:400,width:'100%'}}>
              <div style={{fontSize:11,letterSpacing:'0.2em',color:'#C7321F',marginBottom:14}}>MUJI CONCIERGE</div>
              <h1 style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:20,fontWeight:500,margin:'0 0 16px',lineHeight:1.5}}>APIキーを設定してください</h1>
              <p style={{fontSize:12,lineHeight:1.8,color:'#6B6760',marginBottom:20}}>
                Anthropic Console で取得したAPIキーを入力します。<br />
                このキーはあなたのブラウザ内にのみ保存され、外部に送信されません。
              </p>
              <input type="password" value={apiKey} onChange={(e)=>setApiKey(e.target.value)} placeholder="sk-ant-..." autoFocus
                style={{width:'100%',padding:'12px',border:'1px solid #C9C2B2',fontSize:14,marginBottom:12,outline:'none',background:'#FBF9F4'}} />
              <button type="submit" disabled={!apiKey.trim()}
                style={{width:'100%',padding:'12px',background:apiKey.trim()?'#1F1D18':'#D9D2C2',color:'#FFFFFF',border:'none',fontSize:14,letterSpacing:'0.15em',cursor:apiKey.trim()?'pointer':'default',marginBottom:12}}>
                保存して開始
              </button>
              {hasKey && (
                <button type="button" onClick={()=>setShowSettings(false)}
                  style={{width:'100%',padding:'10px',background:'transparent',border:'1px solid #C9C2B2',fontSize:12,cursor:'pointer',color:'#3A3833'}}>
                  キャンセル
                </button>
              )}
              <p style={{fontSize:10,color:'#8B8780',marginTop:16,lineHeight:1.7}}>
                APIキーの取得：<br />
                console.anthropic.com → API Keys → Create Key
              </p>
            </form>
          </div>
        );
      }

      return (
        <div style={{minHeight:'100vh',padding:'32px 20px 64px'}}>
          <div style={{maxWidth:640,margin:'0 auto'}}>
            <header style={{marginBottom:40,textAlign:'center'}}>
              <div style={{display:'inline-block',padding:'4px 12px',border:'1px solid #C7321F',color:'#C7321F',fontSize:11,letterSpacing:'0.2em',marginBottom:20}}>MUJI CONCIERGE</div>
              <h1 style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:28,fontWeight:500,lineHeight:1.4,margin:'0 0 12px',letterSpacing:'0.05em'}}>
                くらしの相談、<br />無印良品から。
              </h1>
              <p style={{fontSize:13,color:'#6B6760',lineHeight:1.8,margin:0}}>
                困りごとや、これからすることを書いてください。<br />
                ふさわしい商品と使い方をご提案します。
              </p>
            </header>

            <div style={{background:'#FFFFFF',border:'1px solid #E5DFD0',padding:20,marginBottom:16}}>
              <textarea value={input} onChange={(e)=>setInput(e.target.value)} placeholder="例：来週から在宅勤務がはじまります" rows={3}
                style={{width:'100%',border:'none',outline:'none',resize:'none',fontSize:15,lineHeight:1.7,color:'#1F1D18',background:'transparent'}} />
              <button onClick={()=>handleSubmit()} disabled={loading||!input.trim()}
                style={{width:'100%',marginTop:12,padding:'14px',background:(loading||!input.trim())?'#D9D2C2':'#1F1D18',color:'#FFFFFF',border:'none',fontSize:14,letterSpacing:'0.15em',cursor:(loading||!input.trim())?'default':'pointer',transition:'background 0.2s'}}>
                {loading ? '考えています...' : '提案を受け取る'}
              </button>
            </div>

            {!result && !loading && (
              <div style={{marginBottom:32}}>
                <p style={{fontSize:11,color:'#6B6760',letterSpacing:'0.15em',marginBottom:10}}>ためしてみる</p>
                <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                  {examples.map((ex)=>(
                    <button key={ex} onClick={()=>handleSubmit(ex)}
                      style={{background:'transparent',border:'1px solid #C9C2B2',color:'#3A3833',padding:'8px 14px',fontSize:12,cursor:'pointer'}}>
                      {ex}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {loading && (
              <div style={{textAlign:'center',padding:'40px 20px'}}>
                <div style={{display:'inline-block',width:24,height:1,background:'#1F1D18',animation:'pulse 1.4s ease-in-out infinite'}} />
              </div>
            )}

            {error && (
              <div style={{padding:16,background:'#FFF5F3',border:'1px solid #E8C5BD',color:'#8B2818',fontSize:13}}>
                {error}
              </div>
            )}

            {result && (
              <div style={{animation:'fadeIn 0.6s ease-out'}}>
                <div style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:17,lineHeight:1.7,padding:'20px 0',borderTop:'1px solid #D9D2C2',borderBottom:'1px solid #D9D2C2',margin:'24px 0 28px'}}>
                  {result.summary}
                </div>
                <p style={{fontSize:11,color:'#6B6760',letterSpacing:'0.2em',marginBottom:16}}>おすすめの商品</p>
                {result.products.map((p,i)=>(
                  <div key={i} style={{background:'#FFFFFF',border:'1px solid #E5DFD0',padding:'22px 20px',marginBottom:12}}>
                    <div style={{fontSize:10,color:'#C7321F',letterSpacing:'0.15em',marginBottom:8}}>
                      {String(i+1).padStart(2,'0')} / {p.category}
                    </div>
                    <h3 style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:18,fontWeight:500,margin:'0 0 14px',lineHeight:1.5}}>{p.name}</h3>
                    <p style={{fontSize:13,lineHeight:1.8,color:'#3A3833',margin:'0 0 12px'}}>{p.why}</p>
                    <div style={{borderLeft:'2px solid #C7321F',paddingLeft:12,fontSize:13,lineHeight:1.8}}>
                      <div style={{fontSize:10,color:'#6B6760',letterSpacing:'0.15em',marginBottom:4}}>おすすめの使い方</div>
                      {p.howToUse}
                    </div>
                  </div>
                ))}
                <button onClick={()=>{setResult(null);setInput('');}}
                  style={{width:'100%',marginTop:16,padding:'12px',background:'transparent',color:'#3A3833',border:'1px solid #C9C2B2',fontSize:13,letterSpacing:'0.15em',cursor:'pointer'}}>
                  もう一度相談する
                </button>
              </div>
            )}

            <footer style={{marginTop:48,paddingTop:24,borderTop:'1px solid #D9D2C2',fontSize:10,color:'#8B8780',textAlign:'center',letterSpacing:'0.1em',lineHeight:1.8}}>
              PROTOTYPE — AI による提案です。<br />
              商品の在庫・仕様は店舗・公式サイトでご確認ください。<br />
              <button onClick={()=>setShowSettings(true)}
                style={{marginTop:12,marginRight:8,background:'transparent',border:'none',color:'#8B8780',fontSize:10,letterSpacing:'0.1em',cursor:'pointer',textDecoration:'underline'}}>
                設定
              </button>
              <button onClick={clearKey}
                style={{marginTop:12,background:'transparent',border:'none',color:'#8B8780',fontSize:10,letterSpacing:'0.1em',cursor:'pointer',textDecoration:'underline'}}>
                APIキー削除
              </button>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
