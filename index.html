<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="生活の困りごとに、無印良品の商品をご提案します。">
  <title>くらしの相談 — 無印コンシェルジュ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #FFFFFF;
      color: #1F1D18;
      -webkit-font-smoothing: antialiased;
    }
    input, textarea, button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;
    const API_KEY_STORAGE = 'muji_anthropic_api_key';

    function App() {
      const [apiKey, setApiKey] = useState(() => localStorage.getItem(API_KEY_STORAGE) || '');
      const [hasKey, setHasKey] = useState(() => !!localStorage.getItem(API_KEY_STORAGE));
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState('');
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [showSettings, setShowSettings] = useState(false);

      const examples = [
        '来週引っ越しをします',
        '在宅勤務でデスクの上が散らかる',
        '週末にキャンプに行く',
        '梅雨で洗濯物が乾かない',
      ];

      useEffect(() => {
        if (!loading) return;
        const messages = [
          'ご状況を理解しています',
          '無印良品ネットストアを検索しています',
          'おたよりブログを参考にしています',
          '提案をまとめています',
        ];
        let i = 0;
        setLoadingMsg(messages[0]);
        const interval = setInterval(() => {
          i = (i + 1) % messages.length;
          setLoadingMsg(messages[i]);
        }, 3500);
        return () => clearInterval(interval);
      }, [loading]);

      const saveKey = (e) => {
        e?.preventDefault();
        if (!apiKey.trim()) return;
        localStorage.setItem(API_KEY_STORAGE, apiKey.trim());
        setHasKey(true);
        setShowSettings(false);
      };

      const clearKey = () => {
        localStorage.removeItem(API_KEY_STORAGE);
        setApiKey('');
        setHasKey(false);
        setResult(null);
        setInput('');
      };

      const handleSubmit = async (text) => {
        const query = (text ?? input).trim();
        if (!query) return;
        setInput(query);
        setLoading(true);
        setError(null);
        setResult(null);

        const systemPrompt = `あなたは無印良品の商品に精通したコンシェルジュです。

【手順】
1. ユーザーの状況を理解する
2. web_searchツールで site:muji.com を含む検索を行い、実在する適切な無印良品の商品を3点見つける
3. web_searchツールで「site:muji.com/jp/ja/store/articles」を含む検索を行い、それぞれの商品の使い方や生活シーンを「おたより」スタッフブログから調べる
4. 検索結果に基づいて、以下のJSON形式のみで回答する

【検索のコツ】
- 商品検索例: site:muji.com 引っ越し 収納
- ブログ検索例: site:muji.com/jp/ja/store/articles 引っ越し 整理

【JSON形式 - 前後の説明やコードフェンスは絶対に含めない】
{
  "summary": "ユーザーの状況を1文で言い換えた共感の言葉",
  "products": [
    {
      "name": "実在する正確な商品名",
      "category": "カテゴリ（収納、衣料、食品、文具など）",
      "productUrl": "無印良品ネットストア(muji.com)上の正確な商品ページURL",
      "why": "なぜこの商品が役立つかを1〜2文で",
      "howToUse": "おたよりブログを参考にした具体的な使い方や生活シーンを2〜3文で"
    }
  ]
}

必ず3点提案すること。productUrlは実際に検索で見つけた無印公式サイトのURLを正確に記載すること。`;

        try {
          const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-5',
              max_tokens: 4000,
              system: systemPrompt,
              tools: [
                {
                  type: 'web_search_20250305',
                  name: 'web_search',
                  max_uses: 6,
                },
              ],
              messages: [{ role: 'user', content: query }],
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            if (response.status === 401) {
              setError('APIキーが無効です。設定から再入力してください。');
            } else {
              setError(data.error?.message || 'APIエラーが発生しました');
            }
            return;
          }

          let text = (data.content || [])
            .filter((b) => b.type === 'text')
            .map((b) => b.text)
            .join('\n');

          const firstBrace = text.indexOf('{');
          const lastBrace = text.lastIndexOf('}');
          if (firstBrace !== -1 && lastBrace !== -1) {
            text = text.substring(firstBrace, lastBrace + 1);
          }

          const parsed = JSON.parse(text);
          setResult(parsed);
        } catch (e) {
          console.error(e);
          setError('エラー: ' + (e.message || JSON.stringify(e)));
        } finally {
          setLoading(false);
        }
      };

      if (!hasKey || showSettings) {
        return (
          <div style={{minHeight:'100vh',background:'#F4F1EA',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
            <form onSubmit={saveKey} style={{background:'#FFFFFF',border:'1px solid #E5DFD0',padding:32,maxWidth:400,width:'100%'}}>
              <div style={{fontSize:11,letterSpacing:'0.2em',color:'#C7321F',marginBottom:14,fontWeight:500}}>MUJI CONCIERGE</div>
              <h1 style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:20,fontWeight:500,margin:'0 0 16px',lineHeight:1.5}}>APIキーを設定してください</h1>
              <p style={{fontSize:12,lineHeight:1.8,color:'#6B6760',marginBottom:20}}>
                Anthropic Console で取得したAPIキーを入力します。<br />
                このキーはあなたのブラウザ内にのみ保存され、外部に送信されません。
              </p>
              <input type="password" value={apiKey} onChange={(e)=>setApiKey(e.target.value)} placeholder="sk-ant-..." autoFocus
                style={{width:'100%',padding:'12px',border:'1px solid #C9C2B2',fontSize:14,marginBottom:12,outline:'none',background:'#FBF9F4'}} />
              <button type="submit" disabled={!apiKey.trim()}
                style={{width:'100%',padding:'12px',background:apiKey.trim()?'#1F1D18':'#D9D2C2',color:'#FFFFFF',border:'none',fontSize:14,letterSpacing:'0.15em',cursor:apiKey.trim()?'pointer':'default',marginBottom:12}}>
                保存して開始
              </button>
              {hasKey && (
                <button type="button" onClick={()=>setShowSettings(false)}
                  style={{width:'100%',padding:'10px',background:'transparent',border:'1px solid #C9C2B2',fontSize:12,cursor:'pointer',color:'#3A3833'}}>
                  キャンセル
                </button>
              )}
              <p style={{fontSize:10,color:'#8B8780',marginTop:16,lineHeight:1.7}}>
                APIキーの取得：<br />
                console.anthropic.com → API Keys → Create Key
              </p>
            </form>
          </div>
        );
      }

      return (
        <div style={{minHeight:'100vh',background:'#FFFFFF'}}>
          {/* Top bar */}
          <div style={{borderBottom:'1px solid #EAE6DC',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:11,letterSpacing:'0.2em',color:'#C7321F',fontWeight:600}}>MUJI CONCIERGE</div>
            <div style={{fontSize:10,color:'#8B8780',letterSpacing:'0.1em'}}>PROTOTYPE</div>
          </div>

          <div style={{maxWidth:680,margin:'0 auto',padding:'48px 24px 80px'}}>
            <header style={{marginBottom:48,textAlign:'center'}}>
              <h1 style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:30,fontWeight:500,lineHeight:1.5,margin:'0 0 16px',letterSpacing:'0.05em'}}>
                くらしの相談、<br />無印良品から。
              </h1>
              <div style={{width:32,height:1,background:'#C7321F',margin:'20px auto'}} />
              <p style={{fontSize:13,color:'#6B6760',lineHeight:1.9,margin:0}}>
                日々のお困りごとや、これからすることを書いてください。<br />
                無印良品ネットストアの商品と、おたよりからの<br />
                おすすめの使い方をご提案します。
              </p>
            </header>

            <div style={{background:'#FAF8F3',border:'1px solid #EAE6DC',padding:24,marginBottom:24}}>
              <textarea value={input} onChange={(e)=>setInput(e.target.value)} placeholder="例：来週から在宅勤務がはじまります" rows={3}
                style={{width:'100%',border:'none',outline:'none',resize:'none',fontSize:15,lineHeight:1.8,color:'#1F1D18',background:'transparent'}} />
              <button onClick={()=>handleSubmit()} disabled={loading||!input.trim()}
                style={{width:'100%',marginTop:16,padding:'15px',background:(loading||!input.trim())?'#D9D2C2':'#1F1D18',color:'#FFFFFF',border:'none',fontSize:14,letterSpacing:'0.2em',cursor:(loading||!input.trim())?'default':'pointer',transition:'background 0.2s'}}>
                {loading ? '考えています...' : '提案を受け取る'}
              </button>
            </div>

            {!result && !loading && (
              <div style={{marginBottom:40}}>
                <p style={{fontSize:11,color:'#8B8780',letterSpacing:'0.2em',marginBottom:12}}>ためしてみる</p>
                <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                  {examples.map((ex)=>(
                    <button key={ex} onClick={()=>handleSubmit(ex)}
                      style={{background:'#FFFFFF',border:'1px solid #D9D2C2',color:'#3A3833',padding:'10px 16px',fontSize:12,cursor:'pointer',transition:'all 0.2s'}}>
                      {ex}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {loading && (
              <div style={{textAlign:'center',padding:'60px 20px'}}>
                <div style={{display:'inline-block',width:18,height:18,border:'2px solid #EAE6DC',borderTopColor:'#C7321F',borderRadius:'50%',animation:'spin 0.9s linear infinite',marginBottom:20}} />
                <div style={{fontSize:13,color:'#6B6760',letterSpacing:'0.05em',animation:'pulse 2s ease-in-out infinite'}}>
                  {loadingMsg}…
                </div>
                <div style={{fontSize:11,color:'#A8A39A',marginTop:12,letterSpacing:'0.05em'}}>
                  検索のため、10〜30秒ほどお時間をいただきます
                </div>
              </div>
            )}

            {error && (
              <div style={{padding:18,background:'#FFF5F3',border:'1px solid #E8C5BD',color:'#8B2818',fontSize:13,lineHeight:1.7}}>
                {error}
              </div>
            )}

            {result && (
              <div style={{animation:'fadeIn 0.6s ease-out'}}>
                <div style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:18,lineHeight:1.8,padding:'24px 0',borderTop:'1px solid #1F1D18',borderBottom:'1px solid #EAE6DC',margin:'8px 0 32px',color:'#1F1D18'}}>
                  {result.summary}
                </div>

                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:20}}>
                  <p style={{fontSize:11,color:'#8B8780',letterSpacing:'0.25em',margin:0}}>おすすめの商品</p>
                  <p style={{fontSize:10,color:'#A8A39A',margin:0,letterSpacing:'0.05em'}}>{result.products.length}点</p>
                </div>

                {result.products.map((p,i)=>(
                  <div key={i} style={{background:'#FFFFFF',border:'1px solid #EAE6DC',padding:'28px 24px',marginBottom:12}}>
                    <div style={{display:'flex',alignItems:'center',marginBottom:12,gap:10}}>
                      <span style={{fontSize:11,color:'#C7321F',letterSpacing:'0.15em',fontWeight:500}}>
                        {String(i+1).padStart(2,'0')}
                      </span>
                      <span style={{fontSize:10,color:'#6B6760',background:'#F4F1EA',padding:'3px 10px',letterSpacing:'0.1em'}}>
                        {p.category}
                      </span>
                    </div>
                    <h3 style={{fontFamily:"'Shippori Mincho B1', serif",fontSize:19,fontWeight:500,margin:'0 0 16px',lineHeight:1.5,color:'#1F1D18'}}>
                      {p.name}
                    </h3>
                    <p style={{fontSize:13,lineHeight:1.9,color:'#3A3833',margin:'0 0 20px'}}>
                      {p.why}
                    </p>
                    <div style={{background:'#FAF8F3',padding:'16px 18px',marginBottom:20}}>
                      <div style={{fontSize:10,color:'#8B8780',letterSpacing:'0.2em',marginBottom:8,fontWeight:500}}>
                        おすすめの使い方
                      </div>
                      <p style={{fontSize:13,lineHeight:1.9,color:'#1F1D18',margin:0}}>
                        {p.howToUse}
                      </p>
                    </div>
                    {p.productUrl && (
                      <a href={p.productUrl} target="_blank" rel="noopener noreferrer"
                        style={{display:'block',textAlign:'center',padding:'12px',border:'1px solid #1F1D18',color:'#1F1D18',fontSize:12,letterSpacing:'0.15em',transition:'all 0.2s'}}>
                        商品ページを見る  →
                      </a>
                    )}
                  </div>
                ))}

                <button onClick={()=>{setResult(null);setInput('');}}
                  style={{width:'100%',marginTop:20,padding:'14px',background:'transparent',color:'#3A3833',border:'1px solid #C9C2B2',fontSize:13,letterSpacing:'0.2em',cursor:'pointer'}}>
                  もう一度相談する
                </button>
              </div>
            )}

            <footer style={{marginTop:64,paddingTop:28,borderTop:'1px solid #EAE6DC',fontSize:10,color:'#8B8780',textAlign:'center',letterSpacing:'0.1em',lineHeight:2}}>
              本サービスはAIによる提案です。<br />
              商品の在庫・仕様は無印良品ネットストアでご確認ください。<br />
              <button onClick={()=>setShowSettings(true)}
                style={{marginTop:14,marginRight:12,background:'transparent',border:'none',color:'#8B8780',fontSize:10,letterSpacing:'0.1em',cursor:'pointer',textDecoration:'underline'}}>
                設定
              </button>
              <button onClick={clearKey}
                style={{marginTop:14,background:'transparent',border:'none',color:'#8B8780',fontSize:10,letterSpacing:'0.1em',cursor:'pointer',textDecoration:'underline'}}>
                APIキー削除
              </button>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
